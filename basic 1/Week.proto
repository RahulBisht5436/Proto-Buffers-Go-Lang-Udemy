syntax = "proto3";

enum Weekday {
    WEEKDAY_UNSPECIFIED = 0;   // Better than "DEFAULT" — follows official convention
    WEEKDAY_MONDAY = 1;
    WEEKDAY_TUESDAY = 2;
    WEEKDAY_WEDNESDAY = 3;
    WEEKDAY_THURSDAY = 4;
    WEEKDAY_FRIDAY = 5;
    WEEKDAY_SATURDAY = 6;
    WEEKDAY_SUNDAY = 7;
}

message WeekdaysMessage {
    Weekday day = 1;   // ✓ Correct way to use the enum as a field
}